services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: goconcert_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: goconcert
      POSTGRES_USER: goconcert
      POSTGRES_PASSWORD: goconcert
    ports:
      - "5432:5432"
    volumes:
      - goconcert_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goconcert -d goconcert"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  goconcert_pgdata:
